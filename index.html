<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planet Mannett">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="planet-mannett-192.png">
<title>Planet Mannett</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111;--surface:#1c1c1e;--surface2:#2c2c2e;--border:#3a3a3c;
  --text:#f2f2f7;--muted:#8e8e93;--accent:#30d158;--blue:#0a84ff;
  --red:#ff453a;--amber:#ffd60a;--purple:#bf5af2;--radius:14px
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
body{padding-bottom:90px}
header{
  position:sticky;top:0;z-index:100;
  background:rgba(17,17,17,.9);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  padding:env(safe-area-inset-top,12px) 16px 0;
  border-bottom:0.5px solid var(--border)
}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px}
h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.refresh-btn{
  width:34px;height:34px;border-radius:50%;background:var(--surface2);
  border:none;color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
.refresh-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-updated{font-size:11px;color:var(--muted);padding-bottom:8px}

nav{display:flex;padding:10px 16px 0;gap:7px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex-shrink:0;padding:7px 13px;border-radius:20px;border:none;
  background:var(--surface2);color:var(--muted);font-size:13px;font-weight:500;
  cursor:pointer;white-space:nowrap
}
.nav-btn.active{background:var(--text);color:var(--bg)}

main{padding:0 16px}
.panel{display:none;padding-top:14px}
.panel.active{display:block}

.section-title{
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);margin:18px 0 9px
}
.section-title:first-child{margin-top:0}

.card{background:var(--surface);border-radius:var(--radius);margin-bottom:9px;overflow:hidden}
.card-inner{padding:13px 15px}

.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.competition{font-size:12px;color:var(--muted)}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge-live{background:rgba(48,209,88,.15);color:var(--accent)}
.badge-final{background:var(--surface2);color:var(--muted)}
.badge-soon{background:rgba(10,132,255,.15);color:var(--blue)}
.badge-next{background:rgba(255,214,10,.15);color:var(--amber)}
.badge-offseason{background:rgba(191,90,242,.15);color:var(--purple)}

.teams-row{display:flex;align-items:center}
.team-block{flex:1}
.team-name{font-size:15px;font-weight:600}
.team-name.away{text-align:right}
.score-center{display:flex;align-items:center;gap:5px;padding:0 10px;min-width:74px;justify-content:center}
.score-num{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
.score-sep{font-size:15px;color:var(--muted)}

.result-text{font-size:13px;color:var(--muted);margin-top:7px}
.result-text.win{color:var(--accent)}
.result-text.loss{color:var(--red)}
.kickoff{font-size:13px;color:var(--muted);margin-top:7px}
.kickoff strong{color:var(--text)}

.team-hero{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:0.5px solid var(--border)}
.team-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.hero-title{font-size:16px;font-weight:600}
.hero-sub{font-size:12px;color:var(--muted);margin-top:2px}
.hero-badge{margin-left:auto;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface2);color:var(--muted);white-space:nowrap;flex-shrink:0}

.note-card{background:rgba(10,132,255,.08);border:0.5px solid rgba(10,132,255,.25);border-radius:var(--radius);padding:12px 15px;margin-bottom:9px;font-size:13px;color:var(--blue);line-height:1.5}
.ext-link{display:inline-block;margin-top:6px;color:var(--blue);font-weight:500;text-decoration:none;font-size:13px}

.innings-wrap{display:flex;gap:14px;margin-top:7px}
.inn{font-size:13px;color:var(--muted)}
.inn span{color:var(--text);font-weight:500}

.card-highlight{border:1px solid rgba(255,59,48,.35)}
.card-next{border:1px solid rgba(255,214,10,.3)}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>Planet Mannett</h1>
      <div class="last-updated" id="lastUpdated">Tap ↻ to refresh</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()" aria-label="Refresh">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
    </button>
  </div>
  <nav id="navBar">
    <button class="nav-btn active" onclick="showPanel('blackcaps',this)">🏏 Blackcaps</button>
    <button class="nav-btn" onclick="showPanel('warriors',this)">⚡ Warriors</button>
    <button class="nav-btn" onclick="showPanel('crusaders',this)">🏉 Crusaders</button>
    <button class="nav-btn" onclick="showPanel('lions',this)">🦁 Lions</button>
    <button class="nav-btn" onclick="showPanel('dodgers',this)">⚾ Dodgers</button>
    <button class="nav-btn" onclick="showPanel('cantRugby',this)">🔴 Cant Rugby</button>
    <button class="nav-btn" onclick="showPanel('cantCricket',this)">🏏 Cant Cricket</button>
    <button class="nav-btn" onclick="showPanel('scRugby',this)">🟢 SC Rugby</button>
    <button class="nav-btn" onclick="showPanel('ppRfc',this)">📍 PP RFC</button>
  </nav>
</header>

<main>
  <div id="blackcaps" class="panel active"></div>
  <div id="warriors" class="panel"></div>
  <div id="crusaders" class="panel"></div>
  <div id="lions" class="panel"></div>
  <div id="dodgers" class="panel"></div>
  <div id="cantRugby" class="panel"></div>
  <div id="cantCricket" class="panel"></div>
  <div id="scRugby" class="panel"></div>
  <div id="ppRfc" class="panel"></div>
</main>

<script>
function showPanel(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function loadAll(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('lastUpdated').textContent='Updating…';
  renderBlackcaps();renderWarriors();renderCrusaders();renderLions();
  renderDodgers();renderCantRugby();renderCantCricket();renderSCRugby();renderPPRfc();
  setTimeout(()=>{
    btn.classList.remove('spinning');
    const now=new Date().toLocaleString('en-NZ',{timeZone:'Pacific/Auckland',hour:'numeric',minute:'2-digit',day:'numeric',month:'short'});
    document.getElementById('lastUpdated').textContent=`Updated ${now} NZST`;
  },600);
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
loadAll();
